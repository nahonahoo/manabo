<html lang="ja">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f0b000;--gold-dark:#c08000;--gold-light:#fff8e0;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --wood:#8B4513;--wood-light:#d4956a;
  --text:#2d1a0e;--text2:#6b4226;--text3:#a07050;
  --white:#fffdf5;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{min-height:100%;font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:#1a0a00;overflow-x:hidden}

/* 背景画像 */
#bg{position:fixed;inset:0;background-image:url('shop-bg.jfif');background-size:cover;background-position:center;z-index:0}
#bg::after{content:'';position:fixed;inset:0;background:rgba(10,5,0,0.55);z-index:1}

#app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px}

/* ヘッダー */
#header{width:100%;max-width:480px;padding:16px 16px 0;text-align:center}
.shop-title{font-size:1.6rem;font-weight:800;color:var(--gold);text-shadow:0 0 20px rgba(240,176,0,0.8), 0 2px 4px rgba(0,0,0,0.8);letter-spacing:.06em;margin-bottom:4px}
.shop-sub{font-size:.75rem;color:var(--gold-light);opacity:.8;margin-bottom:12px}

/* タブ */
#tabs{display:flex;gap:6px;padding:0 16px;margin-bottom:12px;width:100%;max-width:480px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex-shrink:0;padding:6px 14px;border-radius:99px;border:1.5px solid rgba(240,176,0,0.4);background:rgba(0,0,0,0.4);color:var(--gold-light);font-size:.78rem;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.tab.active{background:var(--gold);color:#2d1a0e;border-color:var(--gold);font-weight:700}

/* 商品グリッド */
#items-grid{width:100%;max-width:480px;padding:0 12px;display:flex;flex-direction:column;gap:10px}

/* 商品カード */
.item-card{background:rgba(255,245,220,0.92);border-radius:16px;padding:12px 14px;border:2px solid var(--wood-light);box-shadow:0 4px 20px rgba(0,0,0,0.4);display:flex;gap:12px;align-items:flex-start;position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.item-card.r0::before{background:#9e9e9e}
.item-card.r1::before{background:#4caf7d}
.item-card.r2::before{background:#1060a0}
.item-card.r3::before{background:#9c27b0}
.item-card.r4::before{background:linear-gradient(90deg,#f0b000,#ff6b00,#f0b000);animation:shimmer 2s infinite}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.7}}

.item-emoji{font-size:2rem;flex-shrink:0;width:44px;text-align:center;line-height:1}
.item-body{flex:1;min-width:0}
.item-header{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.item-name{font-size:.92rem;font-weight:700;color:var(--text);word-break:break-all}
.rarity-badge{font-size:.65rem;padding:1px 7px;border-radius:99px;font-weight:700;white-space:nowrap;flex-shrink:0}
.r0-badge{background:#f5f5f5;color:#666}
.r1-badge{background:#e8f5ee;color:#2a7a50}
.r2-badge{background:#e0f0ff;color:#1060a0}
.r3-badge{background:#f3e5f5;color:#7b1fa2}
.r4-badge{background:linear-gradient(90deg,#fff8e0,#fff0c0);color:#c08000;border:1px solid #f0b000}
.item-desc{font-size:.75rem;color:var(--text2);line-height:1.5;margin-bottom:6px}
.item-footer{display:flex;align-items:center;justify-content:space-between}
.item-seller{font-size:.72rem;color:var(--text3)}
.item-price{font-size:1rem;font-weight:800;color:var(--gold-dark)}
.sold-badge{position:absolute;top:10px;right:10px;background:#c03030;color:white;font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:99px}

/* 購入ボタン */
.buy-btn{padding:5px 14px;background:var(--gold);color:#2d1a0e;border:none;border-radius:99px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.buy-btn:active{opacity:.8}
.buy-btn:disabled{background:#ccc;color:#888;cursor:not-allowed}

/* 空メッセージ */
.empty-msg{text-align:center;padding:3rem 1rem;color:rgba(255,245,220,0.6);font-size:.9rem;line-height:2}

/* トースト */
#toast{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,245,220,0.95);border:2px solid var(--gold);border-radius:16px;padding:10px 20px;font-size:.85rem;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:all .3s;z-index:100;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 購入モーダル */
#buy-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
#buy-modal.show{display:flex}
.buy-sheet{background:var(--white);border-radius:20px;padding:1.5rem;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px;text-align:center}
.buy-sheet h3{font-size:1.1rem;font-weight:700;color:var(--text)}
.buy-item-preview{background:var(--gold-light);border-radius:12px;padding:12px;font-size:.85rem;color:var(--text2);line-height:1.6}
.buy-price{font-size:1.4rem;font-weight:800;color:var(--gold-dark)}
.buy-confirm{padding:13px;background:var(--gold);color:#2d1a0e;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;width:100%}
.buy-cancel{padding:10px;background:#f5f5f5;color:#666;border:none;border-radius:12px;font-size:.9rem;font-family:inherit;cursor:pointer;width:100%}

/* ローディング */
#loading{text-align:center;padding:3rem;color:rgba(255,245,220,0.7);font-size:.9rem}

<div id="app">

<script>
// Firebase設定
const FB_CONFIG = {
  apiKey: "AIzaSyAuxIpIvr40PY6i1dmdE98EQ7IHxjSTisE",
  projectId: "manabo-nhnh",
};
const FB_URL = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents`;

let allShopItems = [];
let currentFilter = 'all';
let buyingItem = null;

// Firestore REST API
async function fsGet(docPath) {
  const res = await fetch(`${FB_URL}/${docPath}`);
  if (!res.ok) return null;
  const data = await res.json();
  return data.fields ? fromFields(data.fields) : null;
}

async function fsPatch(docPath, fields) {
  const body = { fields: toFields(fields) };
  const fieldNames = Object.keys(fields).map(k => `updateMask.fieldPaths=${k}`).join('&');
  await fetch(`${FB_URL}/${docPath}?${fieldNames}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

function toFields(obj) {
  const f = {};
  for (const [k, v] of Object.entries(obj)) {
    if (typeof v === 'string') f[k] = { stringValue: v };
    else if (typeof v === 'number') f[k] = { integerValue: String(v) };
    else if (typeof v === 'boolean') f[k] = { booleanValue: v };
  }
  return f;
}

function fromFields(fields) {
  const obj = {};
  for (const [k, v] of Object.entries(fields)) {
    if ('stringValue'  in v) obj[k] = v.stringValue;
    else if ('integerValue' in v) obj[k] = Number(v.integerValue);
    else if ('doubleValue'  in v) obj[k] = Number(v.doubleValue);
    else if ('booleanValue' in v) obj[k] = v.booleanValue;
    else if ('nullValue'    in v) obj[k] = null;
    else if ('mapValue'     in v) obj[k] = fromFields(v.mapValue.fields || {});
    else if ('arrayValue'   in v) obj[k] = (v.arrayValue.values || []).map(av => {
      if ('stringValue' in av) return av.stringValue;
      if ('integerValue' in av) return Number(av.integerValue);
      if ('booleanValue' in av) return av.booleanValue;
      if ('mapValue' in av) return fromFields(av.mapValue.fields || {});
      return null;
    });
  }
  return obj;
}

// ショップアイテムを読み込む
async function loadShop() {
  try {
    // まなぼ・まなぼみに両方のshopItemsを読む
    const [d1, d2] = await Promise.all([
      fsGet('manabo/shared'),
      fsGet('manabo/mini-shared'),
    ]);

    allShopItems = [];

    for (const [d, owner] of [[d1, 'まなぼ'], [d2, 'まなぼみに']]) {
      console.log(`${owner} data:`, d);
      if (!d?.shopItems) { console.log(`${owner}: shopItemsなし`); continue; }
      try {
        const items = JSON.parse(d.shopItems);
        console.log(`${owner} shopItems:`, items);
        items.forEach(item => allShopItems.push({ ...item, owner }));
      } catch(e) { console.error(`${owner} parse error:`, e); }
    }

    // 売れていないものだけ表示（新しい順）
    allShopItems.sort((a, b) => (b.listedAt || 0) - (a.listedAt || 0));

    document.getElementById('loading').style.display = 'none';
    document.getElementById('items-grid').style.display = '';
    renderItems();
  } catch(e) {
    document.getElementById('loading').textContent = '読み込みに失敗したよ…ページを更新してね';
  }
}

function filterTab(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderItems();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderItems() {
  const grid = document.getElementById('items-grid');
  const filtered = currentFilter === 'all'
    ? allShopItems
    : allShopItems.filter(i => String(i.rarity) === currentFilter);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-msg">このカテゴリの商品はまだないよ✨<br>まなぼたちが発明中かも！</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const ri = RARITY_INFO[item.rarity];
    const sold = item.sold;
    const buyerInfo = sold && item.buyerName
      ? `<div style="font-size:.72rem;color:#888;margin-top:6px;padding:5px 8px;background:#f5f5f5;border-radius:8px">${item.buyerEmoji||'👤'} ${esc(item.buyerName)} が購入しました</div>`
      : '';
    return `<div class="item-card r${item.rarity}" id="shop-${item.shopId}">
      ${sold ? '<span class="sold-badge">SOLD</span>' : ''}
      <div class="item-emoji">${ri.emoji}</div>
      <div class="item-body">
        <div class="item-header">
          <span class="item-name">${esc(item.name)}</span>
          <span class="rarity-badge r${item.rarity}-badge">${ri.name}</span>
        </div>
        <div class="item-desc">${esc(item.desc)}</div>
        <div class="item-footer">
          <span class="item-seller">🏷 ${esc(item.owner)} 作</span>
          <span class="item-price">¥${item.price.toLocaleString()}</span>
        </div>
        ${buyerInfo}
        ${!sold ? `<div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="buy-btn" onclick="openBuy('${item.shopId}')">購入する</button></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openBuy(shopId) {
  buyingItem = allShopItems.find(i => i.shopId === shopId);
  if (!buyingItem) return;
  const ri = RARITY_INFO[buyingItem.rarity];
  document.getElementById('buy-preview').innerHTML =
    `<strong>${ri.emoji} ${esc(buyingItem.name)}</strong><br>${esc(buyingItem.desc)}<br><br>出品者：${esc(buyingItem.owner)}`;
  document.getElementById('buy-price-display').textContent = `¥${buyingItem.price.toLocaleString()}`;
  document.getElementById('buy-modal').classList.add('show');
}

function closeBuyModal() {
  document.getElementById('buy-modal').classList.remove('show');
  buyingItem = null;
}

async function confirmBuy() {
  if (!buyingItem) return;
  document.querySelector('.buy-confirm').disabled = true;

  try {
    // まなぼ or まなぼみにのFBドキュメントを更新してsold=true、売上を加算
    const ownerDoc = buyingItem.owner === 'まなぼ' ? 'shared' : 'mini-shared';
    const d = await fsGet(`manabo/${ownerDoc}`);
    if (!d) throw new Error('データ取得失敗');

    let shopItems = d.shopItems ? JSON.parse(d.shopItems) : [];
    shopItems = shopItems.map(item =>
      item.shopId === buyingItem.shopId ? { ...item, sold: true } : item
    );

    const newCoins = (d.coins || 0) + buyingItem.price;
    await fsPatch(`manabo/${ownerDoc}`, {
      shopItems: JSON.stringify(shopItems),
      coins: newCoins,
    });

    // 画面更新
    buyingItem.sold = true;
    closeBuyModal();
    renderItems();
    showToast(`✨ ${buyingItem.name} を購入したよ！${buyingItem.owner}の売上：¥${buyingItem.price.toLocaleString()}`);
  } catch(e) {
    showToast('⚠ 購入に失敗したよ…もう一度試してね');
  }
  document.querySelector('.buy-confirm').disabled = false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── 時間ベースNPC自動購入システム ──
const CHECK_INTERVAL_HOURS = 4; // 4時間ごとに購入チェック
const LAST_CHECK_KEY = 'shop_last_npc_check';
const LAST_SEEN_KEY  = 'shop_last_seen_items';

// 現在の時間帯を返す（0〜23）
function currentHour() { return new Date().getHours(); }
function currentDay()  { return new Date().getDay(); } // 0=日, 6=土

// 時間帯でアクティブなNPCをフィルタ
function getActiveNPCs() {
  const h = currentHour();
  const d = currentDay();
  return NPCS.filter(npc => {
    // 時間帯フィルター
    if (npc.activeHours) {
      const [from, to] = npc.activeHours;
      if (from < to) { if (h < from || h >= to) return false; }
      else            { if (h < from && h >= to) return false; } // 深夜をまたぐ
    }
    // 曜日フィルター
    if (npc.activeDays && !npc.activeDays.includes(d)) return false;
    return true;
  });
}

// メイン購入チェック（時間ベース）
async function checkNPCAutoSale() {
  const now = Date.now();
  const lastCheck = Number(localStorage.getItem(LAST_CHECK_KEY) || 0);
  const hoursSince = (now - lastCheck) / (1000 * 60 * 60);

  // まだ4時間経っていなければスキップ
  if (hoursSince < CHECK_INTERVAL_HOURS) {
    const remain = Math.ceil(CHECK_INTERVAL_HOURS - hoursSince);
    console.log(`次のNPC巡回まであと約${remain}時間`);
    // それでも「売れたアイテムがないか」通知チェックはする
    await checkNewSales();
    return;
  }

  localStorage.setItem(LAST_CHECK_KEY, String(now));

  const available = allShopItems.filter(i => !i.sold);
  if (available.length === 0) { await checkNewSales(); return; }

  // アクティブなNPCだけに絞る
  const activeNPCs = getActiveNPCs();
  if (activeNPCs.length === 0) { await checkNewSales(); return; }

  const purchases = [];
  const missVisits = []; // 来たけど買わなかった訪問者

  // アクティブNPCのうち何人かがフラッと来店する（買うかどうかは別）
  const visitors = activeNPCs
    .filter(() => Math.random() < 0.35) // 35%の確率で来店
    .slice(0, 4); // 最大4人

  for (const npc of visitors) {
    // この人が欲しそうなアイテムが出品されているか
    const wantedItems = available.filter(item => {
      const catMatch = npc.likes.some(l => item.cat && item.cat.includes(l)) || npc.likes.includes(item.cat);
      const rarityMatch = npc.likeRarity.includes(item.rarity);
      const priceOk = item.price >= npc.budget[0] && item.price <= npc.budget[1];
      return catMatch && rarityMatch && priceOk;
    });

    if (wantedItems.length > 0) {
      // 欲しいものがある → 購入確率チェック
      const item = wantedItems[Math.floor(Math.random() * wantedItems.length)];
      const checkProbs = [0.35, 0.25, 0.18, 0.10, 0.04];
      const prob = checkProbs[item.rarity] ?? 0.20;
      if (Math.random() < prob) {
        purchases.push({ item, npc });
      } else {
        // 来たけど買わなかった（気に入らなかった）
        missVisits.push({ npc, reason: 'almost', item });
      }
    } else {
      // 欲しいものがない → 手ぶらで帰る
      missVisits.push({ npc, reason: 'nothing' });
    }
  }

  // 来客ログを表示（購入後に表示）
  setTimeout(() => showMissVisits(missVisits), purchases.length > 0 ? 8000 : 1000);

  // 最大2件処理
  for (const { item, npc } of purchases.slice(0, 2)) {
    const ownerDoc = item.owner === 'まなぼ' ? 'shared' : 'mini-shared';
    try {
      const d = await fsGet(`manabo/${ownerDoc}`);
      if (!d) continue;
      let shopItems = JSON.parse(d.shopItems || '[]');
      shopItems = shopItems.map(i =>
        i.shopId === item.shopId
          ? { ...i, sold: true, buyerName: npc.name, buyerEmoji: npc.emoji, soldAt: now }
          : i
      );
      const newCoins = (d.coins || 0) + item.price;
      await fsPatch(`manabo/${ownerDoc}`, {
        shopItems: JSON.stringify(shopItems),
        coins: newCoins,
        lastSaleNotice: JSON.stringify({ name: item.name, price: item.price, buyer: npc.name, buyerEmoji: npc.emoji, soldAt: now }),
      });
      item.sold = true;
      item.buyerName = npc.name;
      item.buyerEmoji = npc.emoji;
      const msg = npc.msg[Math.floor(Math.random() * npc.msg.length)];
      showNPCBuyToast(npc, item, msg);
      await new Promise(r => setTimeout(r, 3500));
    } catch(e) { console.warn('NPC purchase error', e); }
  }
  renderItems();
  await checkNewSales();
}

// 「前回見たとき以降に売れたアイテム」を通知
async function checkNewSales() {
  const lastSeen = Number(localStorage.getItem(LAST_SEEN_KEY) || 0);
  const newlySold = allShopItems.filter(i => i.sold && i.soldAt && i.soldAt > lastSeen);
  localStorage.setItem(LAST_SEEN_KEY, String(Date.now()));
  if (newlySold.length === 0) return;

  // 売れたアイテムを上部バナーで通知
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:300;background:linear-gradient(90deg,#f0b000,#ff8c00);color:#2d1a0e;padding:12px 16px;font-size:.88rem;font-weight:700;text-align:center;animation:slideDown .4s ease';
  banner.innerHTML = newlySold.map(i => {
    const ri = RARITY_INFO[i.rarity];
    return `${ri.emoji}「${esc(i.name)}」が${i.buyerEmoji||'👤'}${esc(i.buyerName||'だれか')}に売れました！¥${i.price.toLocaleString()}`;
  }).join('　／　');
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 8000);
}

// 来たけど買わなかった訪問者ログ
const MISS_MSGS = {
  nothing: [
    '「うーん、欲しいものがないなあ…」',
    '「今日は合うものがなかった。また来よう。」',
    '「品揃えが違う…残念。」',
    '「探していたものと違った。出直してくる。」',
    '「今日は縁がなかったか…」',
  ],
  almost: [
    '「惜しい！もう少し安ければ…」',
    '「気になったけど今日は見送り。」',

function showMissVisits(visits) {
  if (!visits || visits.length === 0) return;
  const log = document.getElementById('visitor-log');
  if (!log) return;

  // 冷やかし客をランダムで0〜2人混入
  const numLookers = Math.floor(Math.random() * 3);
  const lookers = [];
  for (let i = 0; i < numLookers; i++) {
    const l = LOOKERS[Math.floor(Math.random() * LOOKERS.length)];
    lookers.push({ npc: { name: l.name, emoji: l.emoji }, reason: 'looker', msg: l.msg });
  }
  const allVisits = [...visits, ...lookers].sort(() => Math.random() - 0.5);

  const entries = allVisits.map(v => {
    // 冷やかし客・NPC個別セリフ・デフォルトの順で
    let msg;
    if (v.reason === 'looker') {
      msg = v.msg;
    } else if (v.npc.miss_msg) {
      msg = v.npc.miss_msg;
    } else {
      const msgs = MISS_MSGS[v.reason] || MISS_MSGS.nothing;
      msg = msgs[Math.floor(Math.random() * msgs.length)];
    }
    const itemHint = v.item ? `（${v.item.cat}が欲しそうだった）` : '';
    return `<div style="display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1)">
      <div style="font-size:1.4rem;flex-shrink:0">${v.npc.emoji}</div>
      <div>
        <div style="font-size:.82rem;font-weight:600;color:#fff0d0">${v.npc.name}</div>
        <div style="font-size:.75rem;color:#c8a870;font-style:italic">${msg}</div>
        ${itemHint ? `<div style="font-size:.68rem;color:#a08050;margin-top:2px">${itemHint}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  log.innerHTML = `
    <div style="font-size:.72rem;font-weight:600;color:#f0b000;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">
      👥 今日の来客（買わずに帰った）
    </div>
    ${entries}`;
  log.style.display = '';
}

function showNPCBuyToast(npc, item, msg) {
  const ri = RARITY_INFO[item.rarity];
  const t = document.getElementById('toast');
  t.innerHTML = `<div style="display:flex;gap:10px;align-items:flex-start">
    <div style="font-size:2rem;flex-shrink:0">${npc.emoji}</div>
    <div>
      <div style="font-weight:700;margin-bottom:3px">${npc.name}が購入！</div>
      <div style="font-size:.78rem;margin-bottom:4px">${ri.emoji}「${esc(item.name)}」¥${item.price.toLocaleString()}</div>
      <div style="font-size:.75rem;color:#a07050;font-style:italic">${msg}</div>
    </div>
  </div>`;
  t.style.maxWidth = '340px';
  t.style.whiteSpace = 'normal';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 6000);
}
